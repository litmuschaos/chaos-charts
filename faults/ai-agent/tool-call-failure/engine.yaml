---
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: tool-call-failure-engine
spec:
  appinfo:
    appns: "default"
    applabel: "app=ai-agent"
    appkind: "deployment"
  chaosServiceAccount: litmus-admin
  experiments:
    - name: tool-call-failure
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "60"
            - name: TOOL_NAMES
              value: "search,read_file,execute_code"
            - name: FAILURE_TYPE
              value: "error"
            - name: FAILURE_PERCENTAGE
              value: "50"
